<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="header-container">
        <div class="header-text"> Title </div>
    </div>

    <nav>
        <a href="index.html">메인페이지</a>
        <a href="login.html">로그인</a>
        <a href="signup.html">회원가입</a>
    </nav>

    <div class="container">
        <h1>Sign Up</h1>
        <form action="./signup.html" method="post">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter your full name" autofocus required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" autocomplete="email" required>

            <label for="username">Username:</label>
            <input type="text" id="username" name="username" placeholder="Choose a username" autocomplete="username" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="Enter a password" autocomplete="current-password" required>

            <label for="confirm">Confirm Password:</label>
            <input type="password" id="confirm" name="confirm" placeholder="Confirm your password" autocomplete="new-password" required>

            <label for="age">Age:</label>
            <input type="number" id="age" name="age" min="1" max="120" step="1" placeholder="18" autocomplete="off" required>

            <label>Sex:</label>
            <div>
                <input type="radio" id="male" name="sex" value="male" required>
                <label for="male" style="display:inline;">Male</label>
                <input type="radio" id="female" name="sex" value="female" required>
                <label for="female" style="display:inline;">Female</label>
            </div>

            <label for="color">Favorite Color:</label>
            <input type="color" id="color" name="color" required>

            <label for="phrase">Favorite Phrase:</label>
            <select id="phrase" name="phrase" required>
                <option value="">Select a phrase</option>
                <option value="carpe-diem">Carpe Diem</option>
                <option value="seize-day">Seize the Day</option>
                <option value="live-laugh-love">Live, Laugh, Love</option>
                <option value="stay-positive">Stay Positive</option>
                <option value="be-yourself">Be Yourself</option>
                <option value="dream-big">Dream Big</option>
            </select>

            <button type="submit">Sign Up</button>
        </form>
    </div>
</body>
</html>
