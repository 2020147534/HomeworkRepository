<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel = "stylesheet" type = "text/css" href = "main.css">
    <title>Sign Up</title>
</head>
<body>
    <h1>Website</h1>

    <nav>
        <a href="./signup.html">Sign Up</a>
        <a href="./login.html">Login</a>
    </nav>

    <!-- Add your signup form here -->
    <form action="./signup.html" method="post">
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name" placeholder="Enter your full name" autofocus required><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" placeholder="Enter your email" autocomplete="email" required><br><br>

        <label for="username">Username:</label><br>
        <input type="text" id="username" name="username" placeholder="Choose a username" autocomplete="username" required><br><br>

        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password" placeholder="Enter a password" autocomplete="current-password" required><br><br>

        <label for="confirm">Confirm Password:</label><br>
        <input type="password" id="confirm" name="confirm" placeholder="Confirm your password" autocomplete="new-password" required><br><br>

        <label for="age">Age:</label><br>
        <input type="number" id="age" name="age" min="1" max="120" step="1" placeholder="18" autocomplete="off" required><br><br>

        <label>Sex:</label><br>
        <input type="radio" id="male" name="sex" value="male" required>
        <label for="male">Male</label>
        <input type="radio" id="female" name="sex" value="female" required>
        <label for="female">Female</label><br><br>

        <label for="color">Favorite Color:</label><br>
        <input type="color" id="color" name="color" required><br><br>

        <label for="phrase">Favorite Phrase:</label><br>
        <select id="phrase" name="phrase" required>
            <option value="">Select a phrase</option>
            <option value="carpe-diem">Carpe Diem</option>
            <option value="seize-day">Seize the Day</option>
            <option value="live-laugh-love">Live, Laugh, Love</option>
            <option value="stay-positive">Stay Positive</option>
            <option value="be-yourself">Be Yourself</option>
            <option value="dream-big">Dream Big</option>
        </select><br><br>

        <button type="submit">Sign Up</button>
    </form>
</body>
</html>
